<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="-80 -80 160 160" role="img" aria-labelledby="title desc">
  <title id="title">Buddy cursor option B - sharp pointer</title>
  <desc id="desc">A sharper gold virtual cursor derived from Buddy's head sparkle, with one fixed top point and three lower points in a fan.</desc>
  <defs>
    <linearGradient id="cursorGoldB" x1="-42" y1="-72" x2="42" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f6d36f"/>
      <stop offset="44%" stop-color="#e2b65f"/>
      <stop offset="100%" stop-color="#bd7f2a"/>
    </linearGradient>
  </defs>
  <path
    fill="url(#cursorGoldB)"
    stroke="#171818"
    stroke-width="7"
    stroke-linejoin="round"
    stroke-linecap="round"
    d="M0-74
       C4-43 13-23 35-7
       C15-4 8 13 38 48
       C15 38 4 28 0 74
       C-4 28 -15 38 -38 48
       C-8 13 -15-4 -35-7
       C-13-23 -4-43 0-74Z"
  />
</svg>
